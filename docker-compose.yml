version: '3.8'

services:
  app:
    build: .
    container_name: timesheet-tracker
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=30
      - DATABASE_URL=sqlite:///./app.db
      - DEBUG=false
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Development service with auto-reload
  app-dev:
    build: .
    container_name: timesheet-tracker-dev
    ports:
      - "8001:8000"
    environment:
      - JWT_SECRET=dev-secret-key-for-testing-only
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=30
      - DATABASE_URL=sqlite:///./app.db
      - DEBUG=true
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    profiles:
      - dev
